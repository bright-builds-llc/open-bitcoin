name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  OPEN_BITCOIN_PARITY_REPORT_DIR: ${{ github.workspace }}/packages/target/parity-reports

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Rust 1.94.1
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1
          components: rustfmt, clippy

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # setup-bazel publishes numeric tags like 0.x.y, not v0.x.y.
      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazel@0.19.0

      - name: Run repo verification
        run: bash scripts/verify.sh

      - name: Upload parity reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-reports
          path: packages/target/parity-reports
          if-no-files-found: ignore
