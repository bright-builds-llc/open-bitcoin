[workspace]
members = [
    "open-bitcoin-chainstate",
    "open-bitcoin-network",
    "open-bitcoin-core",
    "open-bitcoin-consensus",
    "open-bitcoin-primitives",
    "open-bitcoin-codec",
    "open-bitcoin-mempool",
    "open-bitcoin-wallet",
    "open-bitcoin-node",
    "open-bitcoin-rpc",
    "open-bitcoin-cli",
]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT"
repository = "https://github.com/bright-builds-llc/open-bitcoin"
version = "0.1.0"
